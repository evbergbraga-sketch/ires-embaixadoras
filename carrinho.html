<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IRES Embaixadoras — Carrinho</title>
  <link rel="stylesheet" href="css/ires.css"/>
</head>
<body class="page">

<!-- Topbar -->
<header class="topbar">
  <div class="topbar-brand">
    <a href="vitrine.html" style="display:flex;align-items:center;gap:10px;text-decoration:none">
      <div class="brand-logo">
        <span>ires</span>
        <span>emb.</span>
      </div>
      <span class="brand-name">ires<span>.</span></span>
    </a>
  </div>
  <div class="topbar-right" id="topbar-right"></div>
</header>

<div class="main-content" style="max-width:680px">

  <!-- Header -->
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:24px">
    <a href="vitrine.html" style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--gray)">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      Continuar comprando
    </a>
    <h2 style="font-size:20px;font-weight:800">Meu carrinho</h2>
    <span class="pill pill-pink" id="badge-itens">0 itens</span>
  </div>

  <!-- Lista de itens -->
  <div id="lista-carrinho"></div>

  <!-- Aviso quantidade mínima -->
  <div id="aviso-minimo" style="display:none" class="info-box" style="border-color:var(--red)">
    <div class="info-box-dot" style="background:var(--red)"></div>
    <p id="texto-aviso" style="color:var(--gray-lighter)"></p>
  </div>

  <!-- Resumo -->
  <div id="resumo-pedido" style="display:none;margin-top:16px">
    <div class="order-summary order-summary-top">
      <div class="summary-row">
        <span style="color:var(--gray)">Subtotal</span>
        <span id="val-subtotal" class="val">R$ 0,00</span>
      </div>
      <div class="summary-row total">
        <span>Total</span>
        <span id="val-total" class="val">R$ 0,00</span>
      </div>
    </div>

    <div class="form-group" style="margin-top:16px">
      <label>Forma de pagamento</label>
      <select id="forma-pagamento">
        <option value="PIX">PIX</option>
        <option value="BOLETO">Boleto bancário</option>
        <option value="CREDIT_CARD">Cartão de crédito</option>
      </select>
    </div>

    <div class="form-group">
      <label>Observação (opcional)</label>
      <input type="text" id="obs-pedido" placeholder="Ex: Preciso para dia 20"/>
    </div>

    <button class="btn btn-primary" id="btn-finalizar" onclick="finalizarPedido()" style="margin-top:4px">
      Finalizar pedido →
    </button>
  </div>

  <!-- Carrinho vazio -->
  <div id="carrinho-vazio" style="display:none" class="empty-state">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--gray)" stroke-width="1.5">
      <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
      <path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/>
    </svg>
    <p>Seu carrinho está vazio.</p>
    <a href="vitrine.html" class="btn btn-outline btn-sm" style="width:auto;margin-top:16px">Ver produtos</a>
  </div>

</div>

<!-- Modal confirmação de pedido -->
<div id="modal-sucesso" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:999;align-items:center;justify-content:center;padding:16px">
  <div style="background:#161616;border:0.5px solid #2a2a2a;border-radius:20px;width:100%;max-width:520px;overflow:hidden;display:flex;flex-direction:column;max-height:90vh">

    <!-- Header -->
    <div style="padding:16px 20px;border-bottom:0.5px solid #222;display:flex;align-items:center;justify-content:space-between;flex-shrink:0">
      <div>
        <div style="font-size:15px;font-weight:800;color:#fff">Finalizar pagamento</div>
        <div style="font-size:12px;color:#666;margin-top:2px">Pedido <span id="num-pedido" style="color:#f03faa;font-weight:700"></span></div>
      </div>
      <button onclick="fecharModalPagamento()" style="background:none;border:none;color:#666;cursor:pointer;font-size:22px;line-height:1">✕</button>
    </div>

    <!-- iframe do Asaas -->
    <div id="iframe-wrap" style="flex:1;min-height:420px;position:relative">
      <div id="iframe-loading" style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:#161616">
        <div class="spinner"></div>
        <div style="font-size:13px;color:#666">Carregando pagamento...</div>
      </div>
      <iframe id="asaas-iframe" src="" style="width:100%;height:100%;min-height:420px;border:none;display:none"
        onload="document.getElementById('iframe-loading').style.display='none';this.style.display='block'">
      </iframe>
    </div>

    <!-- Footer -->
    <div style="padding:14px 20px;border-top:0.5px solid #222;display:flex;gap:10px;flex-shrink:0">
      <a id="link-asaas-externo" href="#" target="_blank"
        style="flex:1;padding:10px;background:transparent;border:0.5px solid #2a2a2a;border-radius:10px;color:#999;font-size:12px;text-align:center;text-decoration:none">
        Abrir em nova aba ↗
      </a>
      <button onclick="fecharModalPagamento()" style="flex:1;padding:10px;background:transparent;border:0.5px solid #2a2a2a;border-radius:10px;color:#999;font-size:12px;cursor:pointer">
        Pagar depois
      </button>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/carrinho.js"></script>
</body>
</html>
