<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IRES Embaixadoras — Login</title>
  <link rel="stylesheet" href="css/ires.css"/>
</head>
<body>

<div class="auth-page">
  <div class="auth-card">

    <!-- Logo -->
    <div class="auth-logo">
      <div class="auth-logo-circle">
        <span class="logo-ires">ires</span>
        <span class="logo-sub">embaixadoras</span>
      </div>
      <div>
        <div class="auth-title">Portal das Embaixadoras</div>
        <div class="auth-subtitle">Acesse sua conta para continuar</div>
      </div>
      <span class="pill pill-pink">Área exclusiva</span>
    </div>

    <!-- Formulário -->
    <div class="form-group">
      <label for="email">E-mail</label>
      <input type="email" id="email" placeholder="sua@email.com" autocomplete="email"/>
    </div>

    <div class="form-group">
      <label for="senha">Senha</label>
      <input type="password" id="senha" placeholder="••••••••" autocomplete="current-password"/>
    </div>

    <div style="text-align:right;margin-top:-8px;margin-bottom:20px">
      <a href="#" onclick="abrirRecuperacao()" style="font-size:12px">Esqueci minha senha</a>
    </div>

    <button class="btn btn-primary" id="btn-login" onclick="fazerLogin()">Entrar</button>

    <div class="divider">
      <div class="divider-line"></div>
      <span>ou</span>
      <div class="divider-line"></div>
    </div>

    <a href="cadastro.html" class="btn btn-outline">Quero ser embaixadora</a>

    <p style="text-align:center;font-size:11px;color:var(--gray);margin-top:20px">
      Acesso restrito a embaixadoras aprovadas
    </p>
  </div>
</div>

<!-- Modal recuperação de senha -->
<div id="modal-recuperacao" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:999;align-items:center;justify-content:center;padding:16px">
  <div class="card" style="max-width:360px;width:100%">
    <h3 style="font-size:16px;font-weight:700;margin-bottom:6px">Recuperar senha</h3>
    <p style="font-size:12px;color:var(--gray);margin-bottom:16px">
      Informe seu e-mail e enviaremos um link para redefinir sua senha.
    </p>
    <div class="form-group">
      <label for="email-recuperacao">E-mail</label>
      <input type="email" id="email-recuperacao" placeholder="sua@email.com"/>
    </div>
    <div style="display:flex;gap:10px;margin-top:4px">
      <button class="btn btn-outline btn-sm" style="flex:1" onclick="fecharRecuperacao()">Cancelar</button>
      <button class="btn btn-primary btn-sm" style="flex:1" onclick="enviarRecuperacao()">Enviar link</button>
    </div>
  </div>
</div>

<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script>

  // Se já estiver logado, redireciona direto
  (async () => {
    const { data: { session } } = await _supabase.auth.getSession();
    if (!session) return;
    const { data: profile } = await _supabase
      .from('profiles').select('role,status').eq('id', session.user.id).single();
    if (!profile) return;
    if (profile.role === 'admin') return window.location.href = 'admin.html';
    if (profile.status === 'active') return window.location.href = 'painel.html';
    if (profile.status === 'pending') return window.location.href = 'aguardando.html';
  })();

  async function fazerLogin() {
    const email = document.getElementById('email').value.trim();
    const senha = document.getElementById('senha').value;
    const btn   = document.getElementById('btn-login');

    if (!email || !senha) {
      showToast('Preencha e-mail e senha.', 'error'); return;
    }

    btn.disabled = true;
    btn.innerHTML = '<div class="spinner" style="margin:0 auto"></div>';

    try {
      await signIn(email, senha);
    } catch (err) {
      const msg = err.message.includes('Invalid login')
        ? 'E-mail ou senha incorretos.'
        : err.message;
      showToast(msg, 'error');
      btn.disabled = false;
      btn.textContent = 'Entrar';
    }
  }

  // Enter para logar
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') fazerLogin();
  });

  function abrirRecuperacao() {
    document.getElementById('modal-recuperacao').style.display = 'flex';
  }
  function fecharRecuperacao() {
    document.getElementById('modal-recuperacao').style.display = 'none';
  }

  async function enviarRecuperacao() {
    const email = document.getElementById('email-recuperacao').value.trim();
    if (!email) { showToast('Informe o e-mail.', 'error'); return; }
    try {
      await resetPassword(email);
      showToast('Link enviado! Verifique seu e-mail.', 'success');
      fecharRecuperacao();
    } catch (err) {
      showToast(err.message, 'error');
    }
  }

</script>
</body>
</html>
