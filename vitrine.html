<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IRES Embaixadoras — Vitrine</title>
  <link rel="stylesheet" href="css/ires.css"/>
</head>
<body class="page">

<!-- Topbar -->
<header class="topbar">
  <div class="topbar-brand">
    <div class="brand-logo">
      <span>ires</span>
      <span>emb.</span>
    </div>
    <span class="brand-name">ires<span>.</span></span>
  </div>
  <div class="topbar-right" id="topbar-right"></div>
</header>

<!-- Nav -->
<nav class="nav-tabs" id="nav-categorias">
  <a class="nav-tab active" data-cat="" href="#">Todos</a>
</nav>

<!-- Hero -->
<div class="vitrine-hero">
  <div>
    <h2>Bem-vinda, <span id="nome-emb">...</span></h2>
    <p>Produtos exclusivos para embaixadoras IRES</p>
  </div>
  <div class="vitrine-hero-badge">
    <div class="num" id="total-produtos">0</div>
    <div class="lbl">produtos</div>
  </div>
</div>

<!-- Filtros -->
<div class="filters">
  <div class="filter-pill active" data-filter="all" onclick="setFiltro(this,'all')">Todos</div>
  <div class="filter-pill" data-filter="novidades" onclick="setFiltro(this,'novidades')">Novidades</div>
  <div class="filter-pill" data-filter="promo" onclick="setFiltro(this,'promo')">Promoção</div>
  <input type="text" class="search-input" placeholder="Buscar produto..." id="busca" oninput="filtrarProdutos()"/>
</div>

<!-- Grid de produtos -->
<div class="main-content">
  <div id="secao-produtos">
    <div class="loading" id="loading">
      <div class="spinner"></div> Carregando produtos...
    </div>
    <div class="products-grid" id="grid-produtos" style="display:none"></div>
    <div class="empty-state" id="empty-state" style="display:none">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--gray)" stroke-width="1.5"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
      <p>Nenhum produto encontrado.</p>
    </div>
  </div>
</div>

<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/vitrine.js"></script>
</body>
</html>
