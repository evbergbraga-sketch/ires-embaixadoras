<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova senha — IRES Embaixadoras</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root { --burg:#3D0E20; --ouro:#C8A96E; --creme:#F5EFE6; --erro:#e05252; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--burg); min-height:100vh; display:flex; align-items:center; justify-content:center; font-family:'DM Sans',sans-serif; padding:20px; }
  .card { background:var(--creme); border-radius:20px; padding:40px 32px; width:100%; max-width:420px; text-align:center; }
  .logo { width:80px; height:80px; border-radius:50%; background:var(--burg); border:3px solid var(--ouro); display:flex; flex-direction:column; align-items:center; justify-content:center; margin:0 auto 24px; }
  .logo span:first-child { font-family:'Playfair Display',serif; font-size:20px; color:#fff; font-weight:600; }
  .logo span:last-child { font-size:9px; color:var(--ouro); letter-spacing:2px; margin-top:1px; }
  h1 { font-family:'Playfair Display',serif; font-size:1.6rem; color:var(--burg); margin-bottom:8px; }
  p { font-size:13px; color:#9a7a8a; margin-bottom:28px; line-height:1.5; }
  .form-group { margin-bottom:16px; text-align:left; }
  label { display:block; font-size:11px; font-weight:700; color:var(--burg); text-transform:uppercase; letter-spacing:.5px; margin-bottom:6px; }
  input { width:100%; padding:13px 14px; background:#fff; border:1.5px solid #e8ddd4; border-radius:10px; font-size:15px; font-family:'DM Sans',sans-serif; outline:none; transition:border-color .2s; color:var(--burg); }
  input:focus { border-color:var(--ouro); }
  .strength { height:4px; border-radius:2px; margin-top:6px; background:#e8ddd4; overflow:hidden; }
  .strength-bar { height:100%; border-radius:2px; transition:width .3s, background .3s; width:0; }
  .strength-label { font-size:11px; color:#9a7a8a; margin-top:4px; text-align:right; }
  button { width:100%; padding:15px; background:var(--burg); color:var(--ouro); border:none; border-radius:12px; font-size:15px; font-weight:700; font-family:'DM Sans',sans-serif; cursor:pointer; transition:opacity .15s; margin-top:4px; display:flex; align-items:center; justify-content:center; gap:8px; }
  button:hover { opacity:.9; }
  button:disabled { opacity:.6; cursor:not-allowed; }
  .spinner { width:16px; height:16px; border-radius:50%; border:2px solid rgba(200,169,110,.3); border-top-color:var(--ouro); animation:spin .8s linear infinite; display:none; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .msg { padding:12px 14px; border-radius:10px; font-size:13px; margin-top:16px; display:none; }
  .msg.erro { background:rgba(224,82,82,.1); border:1px solid rgba(224,82,82,.3); color:var(--erro); }
  .msg.ok { background:rgba(107,203,119,.1); border:1px solid rgba(107,203,119,.3); color:#2d7a3a; }
  .back { margin-top:20px; font-size:13px; color:#9a7a8a; }
  .back a { color:var(--burg); font-weight:600; text-decoration:none; }
</style>
</head>
<body>
<div class="card">
  <div class="logo"><span>ires</span><span>EMB.</span></div>
  <h1>Nova senha</h1>
  <p>Escolha uma senha segura para sua conta IRES Embaixadoras.</p>

  <div class="form-group">
    <label>Nova senha</label>
    <input type="password" id="senha" placeholder="Mínimo 8 caracteres" oninput="verificarForca(this.value)" autocomplete="new-password"/>
    <div class="strength"><div class="strength-bar" id="strength-bar"></div></div>
    <div class="strength-label" id="strength-label"></div>
  </div>
  <div class="form-group">
    <label>Confirmar senha</label>
    <input type="password" id="confirmar" placeholder="Repita a senha" autocomplete="new-password"/>
  </div>

  <button id="btn" onclick="salvarSenha()">
    <div class="spinner" id="spinner"></div>
    <span id="btn-text">Salvar nova senha</span>
  </button>

  <div class="msg" id="msg"></div>
  <p class="back"><a href="painel.html">← Voltar ao login</a></p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js?v=1778532781"></script>
<script>
const _sb = supabase.createClient(IRES_CONFIG.supabaseUrl, IRES_CONFIG.supabaseKey);

// Processa o token da URL (hash ou query params)
async function init() {
  // Supabase envia o token como hash fragment: #access_token=...&type=recovery
  const hash = window.location.hash.substring(1);
  const params = new URLSearchParams(hash);
  const accessToken = params.get('access_token');
  const type        = params.get('type');

  if (type === 'recovery' && accessToken) {
    // Define a sessão com o token de recovery
    const { error } = await _sb.auth.setSession({
      access_token:  accessToken,
      refresh_token: params.get('refresh_token') || '',
    });
    if (error) {
      mostrarMsg('Link inválido ou expirado. Solicite um novo.', 'erro');
      document.getElementById('btn').disabled = true;
    }
  } else {
    mostrarMsg('Link inválido ou expirado. Solicite um novo link de redefinição.', 'erro');
    document.getElementById('btn').disabled = true;
  }
}

function verificarForca(senha) {
  const bar   = document.getElementById('strength-bar');
  const label = document.getElementById('strength-label');
  let forca = 0;
  if (senha.length >= 8)  forca++;
  if (/[A-Z]/.test(senha)) forca++;
  if (/[0-9]/.test(senha)) forca++;
  if (/[^A-Za-z0-9]/.test(senha)) forca++;
  const cores   = ['#e05252','#e08952','#d4b84a','#6bcb77'];
  const labels  = ['Muito fraca','Fraca','Boa','Forte'];
  bar.style.width    = (forca * 25) + '%';
  bar.style.background = cores[forca - 1] || '#e8ddd4';
  label.textContent  = senha.length ? labels[forca - 1] || '' : '';
}

async function salvarSenha() {
  const senha     = document.getElementById('senha').value;
  const confirmar = document.getElementById('confirmar').value;
  const btn       = document.getElementById('btn');
  const spinner   = document.getElementById('spinner');
  const btnText   = document.getElementById('btn-text');

  if (senha.length < 8) { mostrarMsg('A senha precisa ter ao menos 8 caracteres.', 'erro'); return; }
  if (senha !== confirmar) { mostrarMsg('As senhas não coincidem.', 'erro'); return; }

  btn.disabled = true; spinner.style.display = 'block'; btnText.style.display = 'none';

  const { error } = await _sb.auth.updateUser({ password: senha });

  spinner.style.display = 'none'; btnText.style.display = 'block';

  if (error) {
    btn.disabled = false;
    mostrarMsg('Erro: ' + error.message, 'erro');
  } else {
    mostrarMsg('Senha alterada com sucesso! Redirecionando…', 'ok');
    setTimeout(() => window.location.href = 'painel.html', 2000);
  }
}

function mostrarMsg(texto, tipo) {
  const el = document.getElementById('msg');
  el.textContent = texto;
  el.className = 'msg ' + tipo;
  el.style.display = 'block';
}

init();
</script>
</body>
</html>
