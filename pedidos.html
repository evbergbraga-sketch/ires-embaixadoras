<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IRES Embaixadoras — Meus Pedidos</title>
  <link rel="stylesheet" href="css/ires.css"/>
</head>
<body class="page">

<!-- Topbar -->
<header class="topbar">
  <div class="topbar-brand">
    <a href="painel.html" style="display:flex;align-items:center;gap:10px;text-decoration:none">
      <div class="brand-logo">
        <span>ires</span>
        <span>emb.</span>
      </div>
      <span class="brand-name">ires<span>.</span></span>
    </a>
  </div>
  <div class="topbar-right" id="topbar-right"></div>
</header>

<!-- Nav -->
<nav class="nav-tabs">
  <a class="nav-tab" href="painel.html">Início</a>
  <a class="nav-tab active" href="pedidos.html">Meus pedidos</a>
  <a class="nav-tab" href="painel.html#avisos">Avisos</a>
</nav>

<div class="main-content">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
    <h2 style="font-size:20px;font-weight:800">Meus pedidos</h2>
    <a href="vitrine.html" class="btn btn-primary btn-sm" style="width:auto">+ Novo pedido</a>
  </div>

  <!-- Filtros de status -->
  <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
    <div class="filter-pill active" onclick="filtrar(this,'')">Todos</div>
    <div class="filter-pill" onclick="filtrar(this,'pending')">Pendente</div>
    <div class="filter-pill" onclick="filtrar(this,'paid')">Pago</div>
    <div class="filter-pill" onclick="filtrar(this,'processing')">Em processo</div>
    <div class="filter-pill" onclick="filtrar(this,'shipped')">Enviado</div>
    <div class="filter-pill" onclick="filtrar(this,'delivered')">Entregue</div>
  </div>

  <div id="loading" class="loading"><div class="spinner"></div> Carregando pedidos...</div>
  <div class="orders-list" id="lista-pedidos" style="display:none"></div>
  <div class="empty-state" id="empty" style="display:none">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--gray)" stroke-width="1.5">
      <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
      <line x1="3" y1="6" x2="21" y2="6"/>
      <path d="M16 10a4 4 0 01-8 0"/>
    </svg>
    <p>Nenhum pedido encontrado.</p>
    <a href="vitrine.html" class="btn btn-primary btn-sm" style="width:auto;margin-top:16px">Fazer primeiro pedido</a>
  </div>
</div>

<!-- Modal detalhes do pedido -->
<div id="modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:999;align-items:flex-start;justify-content:center;padding:24px 16px;overflow-y:auto">
  <div id="modal-body" class="card" style="max-width:480px;width:100%;position:relative;margin:auto"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script>

let _perfil = null;
let _todosPedidos = [];

(async () => {
  const ctx = await requireActive();
  if (!ctx) return;
  _perfil = ctx.profile;
  await renderTopbar();
  await carregarPedidos();
})();

async function carregarPedidos() {
  const { data, error } = await _supabase
    .from('orders')
    .select('id, status, total, notes, payment_url, payment_ref, created_at, order_items(quantity, unit_price, subtotal, products(name, images, min_quantity, price))')
    .eq('reseller_id', _perfil.id)
    .order('created_at', { ascending: false });

  document.getElementById('loading').style.display = 'none';

  if (error || !data?.length) {
    document.getElementById('empty').style.display = 'block';
    return;
  }

  _todosPedidos = data;
  renderLista(data);
}

function renderLista(lista) {
  const el    = document.getElementById('lista-pedidos');
  const empty = document.getElementById('empty');

  if (!lista.length) {
    el.style.display    = 'none';
    empty.style.display = 'block';
    return;
  }

  empty.style.display = 'none';
  el.style.display    = 'flex';

  el.innerHTML = lista.map(o => {
    const itens   = o.order_items || [];
    const preview = itens.slice(0,2).map(i => i.products?.name).filter(Boolean).join(', ');
    const img     = itens[0]?.products?.images?.[0] || '';

    return `
      <div class="order-row" onclick="abrirDetalhe('${o.id}')" style="cursor:pointer">
        <div style="width:44px;height:44px;border-radius:var(--radius-md);background:var(--pink-faint);border:0.5px solid var(--pink-deep);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center">
          ${img
            ? `<img src="${img}" style="width:100%;height:100%;object-fit:cover"/>`
            : `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--pink)" stroke-width="1.5"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>`
          }
        </div>
        <div style="flex:1;min-width:0">
          <div class="order-id">#${o.id.slice(-6).toUpperCase()}</div>
          <div class="order-date">${new Date(o.created_at).toLocaleDateString('pt-BR')} · ${itens.length} item${itens.length > 1 ? 's' : ''}</div>
          <div class="order-items-preview" style="margin-top:2px">${preview}</div>
        </div>
        <div style="text-align:right">
          <div class="order-total">${formatBRL(o.total)}</div>
          <div style="margin-top:4px">${statusLabel(o.status)}</div>
        </div>
      </div>
    `;
  }).join('');
}

function filtrar(el, status) {
  document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  const filtrados = status ? _todosPedidos.filter(o => o.status === status) : _todosPedidos;
  renderLista(filtrados);
}

async function abrirDetalhe(id) {
  const o = _todosPedidos.find(x => x.id === id);
  if (!o) return;

  const itens = o.order_items || [];

  document.getElementById('modal-body').innerHTML = `
    <button onclick="fecharModal()" style="position:absolute;top:12px;right:12px;background:none;border:none;color:var(--gray);cursor:pointer;font-size:20px">✕</button>

    <h3 style="font-size:16px;font-weight:800;margin-bottom:4px">Pedido #${o.id.slice(-6).toUpperCase()}</h3>
    <p style="font-size:12px;color:var(--gray);margin-bottom:16px">${new Date(o.created_at).toLocaleDateString('pt-BR', { day:'2-digit', month:'long', year:'numeric' })}</p>

    <div style="margin-bottom:16px">
      ${itens.map(i => {
        const img = i.products?.images?.[0] || '';
        return `
          <div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:0.5px solid var(--border2)">
            <div style="width:48px;height:48px;border-radius:var(--radius-md);background:var(--pink-faint);border:0.5px solid var(--pink-deep);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center">
              ${img ? `<img src="${img}" style="width:100%;height:100%;object-fit:cover"/>` : ''}
            </div>
            <div style="flex:1">
              <div style="font-size:13px;font-weight:600">${i.products?.name || 'Produto'}</div>
              <div style="font-size:11px;color:var(--gray)">${i.quantity} un. × ${formatBRL(i.unit_price)}</div>
            </div>
            <div style="font-size:13px;font-weight:700">${formatBRL(i.subtotal)}</div>
          </div>
        `;
      }).join('')}
      <div style="display:flex;justify-content:space-between;padding:12px 0;font-weight:800;font-size:15px">
        <span>Total</span>
        <span style="color:var(--pink)">${formatBRL(o.total)}</span>
      </div>
    </div>

    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <span style="font-size:13px;color:var(--gray)">Status</span>
      ${statusLabel(o.status)}
    </div>

    ${o.notes ? `
      <div class="info-box" style="margin-bottom:16px">
        <div class="info-box-dot"></div>
        <p>${o.notes}</p>
      </div>
    ` : ''}

    ${o.status === 'pending' ? `
      ${o.payment_url ? `
        <a href="${o.payment_url}" target="_blank" class="btn btn-primary" style="margin-bottom:10px">
          Finalizar pagamento agora ↗
        </a>
      ` : `
        <div class="info-box" style="margin-bottom:10px">
          <div class="info-box-dot" style="background:var(--amber)"></div>
          <p style="color:var(--gray-lighter)">Pagamento pendente. Entre em contato com a IRES para finalizar.</p>
        </div>
      `}
    ` : ''}

    <div style="display:flex;gap:8px">
      <button class="btn btn-outline" style="flex:1" onclick="recomprar('${o.id}')">Recomprar →</button>
      <button class="btn btn-outline" style="flex:1" onclick="fecharModal()">Fechar</button>
    </div>
  `;

  document.getElementById('modal').style.display = 'flex';
  document.body.style.overflow = 'hidden';
}

async function recomprar(orderId) {
  const o = _todosPedidos.find(x => x.id === orderId);
  if (!o) return;

  (o.order_items || []).forEach(i => {
    if (!i.products) return;
    // usa unit_price do pedido original, não o preço atual do produto
    const produto = {
      ...i.products,
      price:        Number(i.unit_price) || Number(i.products.price) || 0,
      min_quantity: Number(i.products.min_quantity) || 1,
    };
    addToCart(produto, i.quantity);
  });

  showToast('Itens adicionados ao carrinho!', 'success');
  setTimeout(() => window.location.href = 'carrinho.html', 1000);
}

function fecharModal() {
  document.getElementById('modal').style.display = 'none';
  document.body.style.overflow = '';
}

document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) fecharModal();
});

</script>
</body>
</html>
