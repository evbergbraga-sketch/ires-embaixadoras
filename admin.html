<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IRES — Painel Admin</title>
  <link rel="stylesheet" href="css/ires.css"/>
</head>
<body class="page">

<!-- Topbar -->
<header class="topbar">
  <div class="topbar-brand">
    <div class="brand-logo">
      <span>ires</span>
      <span>emb.</span>
    </div>
    <span class="brand-name">ires<span>.</span> <span style="font-size:11px;color:var(--gray);font-weight:400">admin</span></span>
  </div>
  <div class="topbar-right" id="topbar-right"></div>
</header>

<!-- Nav tabs igual ao painel da embaixadora -->
<nav class="nav-tabs">
  <a class="nav-tab active" id="nav-dashboard"     onclick="irPara('dashboard')">Dashboard</a>
  <a class="nav-tab"        id="nav-pedidos"        onclick="irPara('pedidos')">Pedidos</a>
  <a class="nav-tab"        id="nav-produtos"       onclick="irPara('produtos')">Produtos</a>
  <a class="nav-tab"        id="nav-embaixadoras"   onclick="irPara('embaixadoras')">Embaixadoras</a>
  <a class="nav-tab"        id="nav-categorias"     onclick="irPara('categorias')">Categorias</a>
  <a class="nav-tab"        id="nav-comunicados"    onclick="irPara('comunicados')">Comunicados</a>
  <a class="nav-tab"        id="nav-depoimentos"    onclick="irPara('depoimentos')">Depoimentos</a>
  <a class="nav-tab"        id="nav-suporte"        onclick="irPara('suporte')">Suporte</a>
</nav>

<!-- Conteúdo principal -->
<main class="main-content" id="conteudo-principal">
  <div class="loading"><div class="spinner"></div> Carregando...</div>
</main>

<!-- Modal genérico -->
<div id="modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:999;align-items:center;justify-content:center;padding:16px;overflow-y:auto">
  <div id="modal-body" class="card" style="max-width:480px;width:100%;position:relative;margin:auto"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css"/>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
