<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IRES — Painel Admin</title>
  <link rel="stylesheet" href="css/ires.css"/>
</head>
<body class="page">

<!-- Topbar -->
<header class="topbar">
  <div class="topbar-brand">
    <button id="btn-menu" onclick="toggleMenu()" style="display:none;background:none;border:none;cursor:pointer;padding:4px 8px 4px 0;margin-right:4px">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--gray-lighter)" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <div class="brand-logo">
      <span>ires</span>
      <span>emb.</span>
    </div>
    <span class="brand-name">ires<span>.</span> <span style="font-size:11px;color:var(--gray);font-weight:400">admin</span></span>
  </div>
  <div class="topbar-right" id="topbar-right"></div>
</header>

<!-- Overlay mobile -->
<div id="sidebar-overlay" onclick="fecharMenu()" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:98"></div>

<div class="admin-layout">

  <!-- Sidebar -->
  <aside class="admin-sidebar" id="admin-sidebar">
    <a class="sidebar-item active" id="nav-dashboard"     onclick="irPara('dashboard')">
      <div class="sidebar-dot"></div> Dashboard
    </a>
    <a class="sidebar-item" id="nav-pedidos"      onclick="irPara('pedidos')">
      <div class="sidebar-dot"></div> Pedidos
    </a>
    <a class="sidebar-item" id="nav-produtos"     onclick="irPara('produtos')">
      <div class="sidebar-dot"></div> Produtos
    </a>
    <a class="sidebar-item" id="nav-embaixadoras" onclick="irPara('embaixadoras')">
      <div class="sidebar-dot"></div> Embaixadoras
    </a>
    <a class="sidebar-item" id="nav-categorias"   onclick="irPara('categorias')">
      <div class="sidebar-dot"></div> Categorias
    </a>
    <a class="sidebar-item" id="nav-comunicados"  onclick="irPara('comunicados')">
      <div class="sidebar-dot"></div> Comunicados
    </a>
  </aside>

  <!-- Conteúdo principal -->
  <main class="admin-main" id="conteudo-principal">
    <div class="loading"><div class="spinner"></div> Carregando...</div>
  </main>

</div>

<!-- Modal genérico -->
<div id="modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:999;align-items:center;justify-content:center;padding:16px;overflow-y:auto">
  <div id="modal-body" class="card" style="max-width:480px;width:100%;position:relative;margin:auto"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css"/>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/admin.js"></script>
<script>
function toggleMenu() {
  const sidebar  = document.getElementById('admin-sidebar');
  const overlay  = document.getElementById('sidebar-overlay');
  const aberto   = sidebar.classList.toggle('mobile-open');
  overlay.style.display = aberto ? 'block' : 'none';
}
function fecharMenu() {
  document.getElementById('admin-sidebar').classList.remove('mobile-open');
  document.getElementById('sidebar-overlay').style.display = 'none';
}
// fecha menu ao navegar
document.addEventListener('click', e => {
  if (e.target.closest('.sidebar-item')) fecharMenu();
});
</script>
<style>
@media (max-width:700px) {
  #btn-menu { display:block !important; }
}
</style>
</body>
</html>
